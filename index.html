<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JimmaC Tattoo Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: #fff; color: #0d0d0d; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    h1 { font-family: 'Sora', sans-serif; font-size: 3rem; font-weight: 800; color: #090909; margin-bottom: 0.3rem; }
    .sub { color: rgba(0,0,0,0.4); font-weight: 300; margin-bottom: 2rem; }
    .versions { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .version {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 24px;
      padding: 2rem 2.5rem;
      text-decoration: none;
      color: #0d0d0d;
      transition: all 0.3s;
      min-width: 200px;
    }
    .version:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); }
    .version h2 { font-family: 'Sora', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
    .version p { font-size: 0.8rem; color: rgba(0,0,0,0.4); font-weight: 300; }
    .made { margin-top: 3rem; font-size: 0.75rem; color: rgba(0,0,0,0.15); }
  </style>
</head>
<body>
  <img src="jimmac_tattoo_transparent.png" alt="JimmaC" style="max-width:160px;margin-bottom:1.5rem;" />
  <h1>JimmaC Tattoo</h1>
  <p class="sub">Tattoo & Piercing Studio · Λάρισα</p>
  <div class="versions">
    <a href="v1/" class="version">
      <h2>V1</h2>
      <p>Τρέχουσα έκδοση</p>
    </a>
    <a href="v2/" class="version">
      <h2>V2</h2>
      <p>Νέα έκδοση</p>
    </a>
  </div>
  <p class="made">© 2026 JimmaC Tattoo Studio · Made by Mac 🍜</p>
</body>
</html>
